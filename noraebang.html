<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noraebang</title>
    <link rel="prefetch" href="index.html" />
    <style>
      @view-transition {
        navigation: auto;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: url("images/cloud.jpg") repeat;
        background-size: 180px 180px;
        color: #fff;
        font-family: "DungGeunMo", system-ui, sans-serif;
        overflow-x: hidden;
      }

      .rockstar-img {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(980px, 80vw);
        max-height: 92vh;
        height: auto;
        z-index: 0;
        pointer-events: none;
        user-select: none;
        view-transition-name: rockstar;
      }

      .container {
        min-height: 100vh;
        position: relative;
        z-index: 1;
        opacity: 0;
        transition: opacity 0.42s ease;
      }

      .container.entered {
        opacity: 1;
      }

      .scroll-spacer {
        position: relative;
        height: 220vh;
        background: url("images/cloud.jpg") repeat;
        background-size: 180px 180px;
      }

      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation-duration: 320ms;
        animation-timing-function: ease;
      }
    </style>
  </head>
  <body>
    <img src="images/rockstar.png" class="rockstar-img" alt="rockstar" aria-hidden="true" />
    <main class="container" aria-hidden="true"></main>
    <section class="scroll-spacer" aria-hidden="true"></section>

    <script>
      const container = document.querySelector(".container");

      // noraebang에서도 아래로 계속 스크롤하면 index로 순환
      let isNavigating = false;
      let lastY = window.scrollY || 0;
      let touchStartY = null;

      function goToIndexSmooth() {
        if (isNavigating) return;
        isNavigating = true;
        window.location.href = "index.html";
      }

      function handleScrollLoop() {
        const h = window.innerHeight || 1;
        const y = window.scrollY || window.pageYOffset || 0;
        const isScrollingUp = y < lastY;
        // 맨 위 근처에서 위로 스크롤하면 intro로
        if (!isNavigating && isScrollingUp && y <= 8) {
          goToIndexSmooth();
        }
        lastY = y;
      }

      window.addEventListener("scroll", handleScrollLoop, { passive: true });
      window.addEventListener("resize", handleScrollLoop);

      // 트랙패드/마우스 휠: 맨 위에서 위로 밀면 바로 이전 페이지
      window.addEventListener(
        "wheel",
        (e) => {
          const y = window.scrollY || window.pageYOffset || 0;
          if (!isNavigating && y <= 2 && e.deltaY < 0) {
            goToIndexSmooth();
          }
        },
        { passive: true }
      );

      // 모바일: 맨 위에서 아래로 스와이프(당기기)하면 이전 페이지
      window.addEventListener(
        "touchstart",
        (e) => {
          touchStartY = e.touches && e.touches[0] ? e.touches[0].clientY : null;
        },
        { passive: true }
      );
      window.addEventListener(
        "touchmove",
        (e) => {
          const y = window.scrollY || window.pageYOffset || 0;
          if (touchStartY == null || !e.touches || !e.touches[0]) return;
          const currentY = e.touches[0].clientY;
          const pullDown = currentY - touchStartY;
          if (!isNavigating && y <= 2 && pullDown > 28) {
            goToIndexSmooth();
          }
        },
        { passive: true }
      );

      handleScrollLoop();
    </script>
  </body>
</html>
