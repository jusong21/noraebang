<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Result вҖ” Goodbye Party</title>
    <link
      rel="preload"
      href="fonts/DungGeunMo/DungGeunMo.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="preload" href="images/cloud.jpg" as="image" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/quiz-room.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="quiz-room-page quiz-result-page">
    <div class="quiz-room">
      <div class="quiz-rig">
        <div class="quiz-mirrorball-wrap" aria-hidden="true">
          <div class="quiz-mirrorball-chain"></div>
          <div class="quiz-mirrorball">
            <div class="quiz-mirrorball-sparkle"></div>
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <defs>
                <radialGradient id="mbGlowResult" cx="35%" cy="35%" r="65%">
                  <stop offset="0%" stop-color="#f8fafc" />
                  <stop offset="45%" stop-color="#94a3b8" />
                  <stop offset="100%" stop-color="#475569" />
                </radialGradient>
                <pattern id="mbTilesResult" width="8" height="8" patternUnits="userSpaceOnUse">
                  <rect width="8" height="8" fill="#64748b" />
                  <rect x="0" y="0" width="4" height="4" fill="#cbd5e1" />
                  <rect x="4" y="4" width="4" height="4" fill="#94a3b8" />
                  <rect x="4" y="0" width="4" height="4" fill="#e2e8f0" opacity="0.85" />
                  <rect x="0" y="4" width="4" height="4" fill="#475569" />
                </pattern>
              </defs>
              <circle cx="32" cy="32" r="28" fill="url(#mbTilesResult)" />
              <circle cx="32" cy="32" r="28" fill="url(#mbGlowResult)" opacity="0.42" />
              <circle cx="32" cy="32" r="28" fill="none" stroke="#334155" stroke-width="1.2" />
              <ellipse cx="24" cy="22" rx="10" ry="6" fill="rgba(255,255,255,0.35)" opacity="0.7" />
            </svg>
          </div>
        </div>

        <div class="quiz-screen-wrap">
          <div class="quiz-screen-bezel">
            <div class="quiz-screen-inner">
              <p class="quiz-room__welcome">
                Welcome, <span id="quizGreeting">вҖ”</span>
              </p>
              <div class="quiz-room__progress" aria-hidden="true">
                Quiz <strong>RESULT</strong>
              </div>
              <p class="quiz-room__question" id="quizScoreLine">м җмҲҳ кі„мӮ° мӨ‘вҖҰ</p>
              <p class="quiz-room__hint quiz-room__hint--result-summary" id="quizSummary" style="display: none">
                лӢөм•Ҳмқ„ л¶Ҳлҹ¬мҳӨлҠ” мӨ‘мһ…лӢҲлӢӨвҖҰ
              </p>
              <div
                id="noraeComment"
                class="quiz-norae-comment quiz-norae-comment--in-screen"
                style="display: none"
                role="status"
                aria-live="polite"
              >
                <span class="quiz-norae-comment__label">SCORE COMMENT</span>
                <span id="noraeCommentText"></span>
              </div>
            </div>
            <p class="quiz-tv-brand">SAMSUNG</p>
          </div>
        </div>

        <div class="quiz-room__choices quiz-room__choices--ranking" aria-label="Ranking">
          <div class="quiz-room__ranking-wrap quiz-room__ranking-wrap--grid-span">
            <div class="quiz-room__ranking-title">Ranking</div>
            <ol class="quiz-room__ranking quiz-ranking-list" id="quizRankingList"></ol>
          </div>
        </div>

        <div class="quiz-machine" role="region" aria-label="л…ёлһҳл°© лҰ¬лӘЁм»Ё">
          <div class="quiz-machine__body">
            <div class="quiz-machine__led"></div>
            <nav class="quiz-nav quiz-machine__nav quiz-machine__nav--result" aria-label="кІ°кіј нҷ”л©ҙ мқҙлҸҷ">
              <div class="quiz-machine__knobs quiz-machine__knobs--nav">
                <a class="quiz-machine__nav-btn quiz-machine__nav-btn--prev" href="quiz10.html">вҶҗ Q10</a>
                <div class="quiz-machine__knob"></div>
                <div class="quiz-machine__knob"></div>
                <div class="quiz-machine__knob"></div>
                <a class="quiz-machine__nav-btn quiz-machine__nav-btn--next" href="quizintro.html">Retake quiz</a>
              </div>
              <div class="quiz-machine__slot"></div>
            </nav>
            <div class="quiz-machine__dock" aria-label="Quick navigation">
                <a class="quiz-machine__dock-btn" href="main.html" title="Main menu" aria-label="Main menu">
                  <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                </a>
                <a class="quiz-machine__dock-btn" href="index.html" title="Opening" aria-label="Opening scene">
                  <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (async function () {
        const KEY = "quizAnswers";
        const NICK_KEY = "partyNickname";
        const DEFAULT_NICK = "Your name";
        const SUPABASE_URL = "https://pyyjdrsmzhuesilupgsu.supabase.co";
        const SUPABASE_ANON_KEY =
          "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5eWpkcnNtemh1ZXNpbHVwZ3N1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjUyMDAsImV4cCI6MjA5MDE0MTIwMH0.VdpnEEyhia6mysw2rv1pzKtwfJ60o-zGtl8Par4-mJI";
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const g = document.getElementById("quizGreeting");
        let nick = sessionStorage.getItem(NICK_KEY);
        if (nick === "Guest") {
          nick = DEFAULT_NICK;
          sessionStorage.setItem(NICK_KEY, nick);
        }
        g.textContent = (nick || DEFAULT_NICK).trim() || DEFAULT_NICK;

        function getAnswers() {
          try {
            const raw = sessionStorage.getItem(KEY);
            if (!raw) return null;
            return JSON.parse(raw);
          } catch {
            return null;
          }
        }

        function countCorrect(answers) {
          if (!answers || typeof answers !== "object") return 0;
          let n = 0;
          for (let i = 1; i <= 10; i++) {
            const legacy = answers["q" + i];
            if (legacy === true) {
              n++;
              continue;
            }
            const pageKey = "quiz" + i + ".html";
            const entry = answers[pageKey];
            if (entry && typeof entry === "object" && entry.correct === true) n++;
          }
          return n;
        }

        function pointsFromCorrect(correct) {
          return Math.min(100, Math.max(0, correct * 10));
        }

        function noraeCommentForPoints(points) {
          const p = Math.min(100, Math.max(0, points));
          if (p === 100) {
            return { text: "Professional guesser рҹ‘‘", tone: "s" };
          }
          if (p >= 90) {
            return { text: "Mind reader рҹ”®", tone: "s" };
          }
          if (p >= 80) {
            return { text: "Loveya вқӨпёҸ", tone: "s" };
          }
          if (p >= 70) {
            return { text: "Good job рҹҳҺ", tone: "s" };
          }
          if (p >= 60) {
            return { text: "You're surviving рҹӨ“", tone: "warn" };
          }
          if (p >= 50) {
            return { text: "Halfway there рҹҳҮ", tone: "warn" };
          }
          if (p >= 40) {
            return { text: "I'm kinda judging you... just a little рҹҷҠ", tone: "warn" };
          }
          if (p >= 30) {
            return { text: "Are you still my friend? рҹӨ”", tone: "bad" };
          }
          if (p >= 20) {
            return { text: "Are you still my friend? рҹӨ”", tone: "bad" };
          }
          if (p >= 10) {
            return { text: "Who are you? рҹ’©", tone: "bad" };
          }
          return { text: "Who are you? рҹҳЎ", tone: "bad" };
        }

        function rowPoints(row) {
          if (row && typeof row.points100 === "number") return row.points100;
          const s = row && typeof row.score === "number" ? row.score : 0;
          if (s <= 10) return s * 10;
          return s;
        }

        async function loadRanking() {
          const { data, error } = await sb
            .from("quiz_rankings")
            .select("nickname, score, created_at")
            .order("score", { ascending: false })
            .order("created_at", { ascending: true })
            .limit(20);
          if (error) {
            console.error(error);
            return [];
          }
          return (data || []).map((row) => ({
            nick: row.nickname,
            points100: Number(row.score) || 0,
            createdAt: row.created_at,
          }));
        }

        async function saveRankingEntry(nick, points, answered) {
          const { error } = await sb.from("quiz_rankings").insert({
            nickname: nick,
            score: Math.max(0, Math.min(100, Number(points) || 0)),
            answered: Math.max(0, Math.min(10, Number(answered) || 0)),
          });
          if (error) console.error(error);
        }

        function normalizeNick(input) {
          let nick = String(input || "").trim();

          // (1) м•һм—җ "1. ", "2. "мІҳлҹј мҲңлІҲмқҙ л°ҳліө м ҖмһҘлҗҳм–ҙ мһҲмңјл©ҙ м „л¶Җ м ңкұ°
          nick = nick.replace(/^\s*(?:\d+\s*\.?\s*)+/, "");

          // (2) лҢҖмӢң л’Өмқҳ м җмҲҳ/100 к°ҷмқҖ л¶Җк°Җм •ліҙ м ңкұ°
          nick = nick.replace(/\s*[вҖ”вҖ“-].*$/, "");

          // (3) нҳ№мӢң лӮЁм•„мһҲлҠ” " / 100" м ңкұ°
          nick = nick.replace(/\s*\/\s*\d+\s*$/, "");

          nick = nick.trim();
          if (!nick || nick === "Your name") return "Guest";
          return nick.slice(0, 24);
        }

        const answers = getAnswers();
        const hasAnswers = !!answers;
        const correct = countCorrect(answers || {});
        const points = pointsFromCorrect(correct);

        const scoreLine = document.getElementById("quizScoreLine");
        const summary = document.getElementById("quizSummary");
        const noraeEl = document.getElementById("noraeComment");
        const noraeText = document.getElementById("noraeCommentText");
        const listEl = document.getElementById("quizRankingList");

        scoreLine.textContent = points + "м җ";
        summary.textContent = "Maybe... The highest score gets a small gift? рҹҺҒ";
        summary.style.display = "";

        const nc = noraeCommentForPoints(points);
        noraeText.textContent = nc.text;
        noraeEl.className =
          "quiz-norae-comment quiz-norae-comment--in-screen quiz-norae-comment--" +
          (nc.tone || "warn");
        noraeEl.style.display = "block";

        let ranking = await loadRanking();
        if (hasAnswers) {
          const nickFromAnswers = normalizeNick(
            (answers && typeof answers.nick === "string" && answers.nick.trim()) ||
              sessionStorage.getItem(NICK_KEY) ||
              ""
          );
          const answered = Object.keys(answers).filter(function (k) {
            if (k === "nick") return false;
            if (k.startsWith("q")) return true;
            return /^quiz\d+\.html$/i.test(k);
          }).length;
          await saveRankingEntry(nickFromAnswers, points, answered);
          ranking = await loadRanking();
        }

        listEl.innerHTML = "";
        ranking.forEach(function (row) {
          const li = document.createElement("li");
          const pts = rowPoints(row);
          const nick = normalizeNick(row && row.nick);
          const safeNick = String(nick || "Guest").replace(/^\s*(?:\d+\s*\.?\s*)+/, "");
          li.textContent = safeNick + " вҖ” " + pts + "м җ";
          listEl.appendChild(li);
        });
      })();
    </script>
  </body>
</html>
